<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="display-3 text-center">Weather Application</h1>

    <div class="container w-25">
        <div class="row">
                <div class="form-floating">
                    <input type="text" class="form-control" id="cityInput" placeholder="City Name">
                    <label for="cityInput">City Name</label>
                </div>
                <div>
                    <button class="btn btn-primary w-100 mt-3" onclick="getWeatherData()">Submit</button>
                </div>
            <div class="container" id="dataResult">

            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
